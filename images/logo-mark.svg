<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">PAT Orbit logo mark</title>
  <desc id="desc">A modern PAT Orbit monogram with an upward agentic technology line.</desc>
  <defs>
    <linearGradient id="logo-bg" x1="12" y1="10" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#082f49"/>
      <stop offset=".48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="logo-accent" x1="24" y1="70" x2="78" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset=".52" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#020617" flood-opacity=".38"/>
    </filter>
  </defs>

  <rect width="96" height="96" rx="22" fill="url(#logo-bg)"/>
  <path d="M18 76V20h27c18 0 32 12 32 28s-14 28-32 28H18Z" fill="none" stroke="#1e293b" stroke-width="10"/>
  <path d="M28 66V30h16c12 0 22 8 22 18s-10 18-22 18H28Z" fill="none" stroke="url(#logo-accent)" stroke-width="7" stroke-linejoin="round" filter="url(#soft-shadow)"/>

  <path d="M45 70 60 32l16 38" fill="none" stroke="#e2e8f0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M53 56h15" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round"/>

  <path d="M24 72h52" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" opacity=".45"/>
  <path d="M30 62V50m9 12V42m9 20V54" stroke="#a7f3d0" stroke-width="4" stroke-linecap="round" opacity=".82"/>
  <path d="M26 58 39 48l10 7 21-25" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="26" cy="58" r="4" fill="#22d3ee"/>
  <circle cx="39" cy="48" r="4" fill="#60a5fa"/>
  <circle cx="49" cy="55" r="4" fill="#60a5fa"/>
  <circle cx="70" cy="30" r="4" fill="#a7f3d0"/>
